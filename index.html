<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Operator</title>
<style>
  :root{
    --bg:#0b0c0e; --side:#101113; --surface:#15171a; --surface-2:#1c1f23; --inset:#101214;
    --line:#23262b; --line-soft:#1a1d21;
    --text:#e7e9ec; --muted:#878f96; --faint:#565d65;
    --accent:#6b8afd; --accent-soft:rgba(107,138,253,.13);
    --green:#5fb07a; --green-soft:rgba(95,176,122,.14);
    --red:#cf6f63; --red-soft:rgba(207,111,99,.14);
    --amber:#d6a441;
    --teal:#5fd3c2;
    --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
    --sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --r:11px;
  }
  [data-theme="light"]{
    --bg:#f6f7f8; --side:#edeff1; --surface:#ffffff; --surface-2:#f0f2f4; --inset:#f4f6f7;
    --line:#e1e4e7; --line-soft:#eceef0;
    --text:#14171a; --muted:#646b72; --faint:#9aa1a8;
    --accent:#3f63d6; --accent-soft:rgba(63,99,214,.09);
    --green:#3f8a52; --green-soft:rgba(63,138,82,.11);
    --red:#b6534a; --red-soft:rgba(182,83,74,.11);
    --amber:#a9791a;
    --teal:#0e8a78;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.5;overflow:hidden}
  .mono{font-family:var(--mono);font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}
  .eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600}

  .app{display:flex;height:100vh}

  /* sidebar */
  .sidebar{width:236px;flex-shrink:0;background:var(--side);border-right:1px solid var(--line);display:flex;flex-direction:column;height:100%}
  .drag{height:30px;-webkit-app-region:drag;flex-shrink:0}
  .brand{padding:2px 20px 18px;-webkit-app-region:drag;display:flex;align-items:center;gap:8px}
  .brand .name{font-family:var(--mono);font-weight:700;letter-spacing:.16em;font-size:14px}
  .brand .name b{color:var(--accent)}
  .brand .tag{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--faint);border:1px solid var(--line);padding:1px 5px;border-radius:4px}
  nav{flex:1;overflow-y:auto;padding:4px 12px}
  .nav-group{margin-bottom:18px}
  .nav-label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);font-weight:600;padding:0 10px 7px}
  .nav-item{-webkit-app-region:no-drag;width:100%;display:flex;align-items:center;gap:11px;padding:8px 10px;border:none;background:none;color:var(--muted);font-family:var(--sans);font-size:13.5px;font-weight:500;border-radius:8px;cursor:pointer;text-align:left;margin-bottom:1px}
  .nav-item:hover{background:var(--surface-2);color:var(--text)}
  .nav-item[aria-current="page"]{background:var(--surface-2);color:var(--text)}
  .nav-item[aria-current="page"] svg{color:var(--accent)}
  .nav-item svg{width:17px;height:17px;flex-shrink:0;color:var(--faint)}
  .nav-item[aria-current="page"] svg,.nav-item:hover svg{color:var(--accent)}
  .side-foot{padding:12px;border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px}
  .side-foot .v{font-family:var(--mono);font-size:10px;color:var(--faint);letter-spacing:.05em}
  .ghost-btn{-webkit-app-region:no-drag;background:none;border:1px solid var(--line);color:var(--muted);border-radius:7px;cursor:pointer;font-size:12px;padding:6px 10px;display:flex;align-items:center;gap:6px}
  .ghost-btn:hover{border-color:var(--accent);color:var(--text)}

  /* main */
  main{flex:1;overflow-y:auto;height:100%}
  .view{max-width:880px;margin:0 auto;padding:40px 44px 64px}
  .view-title{font-size:13px;letter-spacing:.04em;color:var(--muted);font-weight:600;margin-bottom:4px}

  /* greeting */
  .greet{font-size:24px;font-weight:650;letter-spacing:-.02em;margin-bottom:6px}
  .sub{color:var(--muted);font-size:14px;margin-bottom:28px}
  .sub b{color:var(--text);font-weight:600}

  /* stat cards */
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
  .stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 16px 14px}
  .stat .n{font-size:26px;font-weight:650;letter-spacing:-.02em;line-height:1.1}
  .stat .l{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--muted);margin-top:8px}
  .stat .l::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--faint)}
  .stat.a .l::before{background:var(--accent)}
  .stat.g .l::before{background:var(--green)}
  .stat.am .l::before{background:var(--amber)}

  /* generic card */
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r)}
  .card-head{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--line)}
  .card-head h3{font-size:13.5px;font-weight:600}
  .card-head .meta{font-family:var(--mono);font-size:12px;color:var(--muted)}

  /* today lift rows */
  .lift-row{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--line-soft)}
  .lift-row:last-child{border-bottom:none}
  .lift-meta{flex:1;min-width:0}
  .lift-name{font-size:14.5px;font-weight:600;letter-spacing:-.01em}
  .lift-scheme{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:2px}
  .lift-val{text-align:right;white-space:nowrap}
  .kg{font-family:var(--mono);font-size:27px;font-weight:600;letter-spacing:-.02em;line-height:1}
  .kg small{font-size:12px;color:var(--muted);font-weight:500;margin-left:3px}
  .added{font-family:var(--mono);font-size:11px;color:var(--faint);margin-top:5px}
  .row-flag{font-family:var(--mono);font-size:12px;color:var(--faint)}

  .readiness{display:flex;gap:8px;margin:18px 0 8px}
  .rb{flex:1;background:var(--surface);border:1px solid var(--line);color:var(--muted);border-radius:9px;padding:9px 0;font-size:12px;font-weight:600;letter-spacing:.03em;cursor:pointer;text-transform:uppercase}
  .rb:hover{color:var(--text)}
  .rb[data-on="green"]{border-color:var(--green);color:var(--green);background:var(--green-soft)}
  .rb[data-on="amber"]{border-color:var(--amber);color:var(--amber);background:rgba(214,164,65,.12)}
  .rb[data-on="red"]{border-color:var(--red);color:var(--red);background:var(--red-soft)}
  .nudge{font-size:13px;color:var(--muted);min-height:19px;margin-bottom:20px}
  .nudge b{color:var(--text);font-weight:600}

  .actions{display:flex;gap:8px;flex-wrap:wrap}
  .btn{font-family:var(--sans);font-size:13px;font-weight:600;padding:9px 15px;border-radius:8px;cursor:pointer;border:1px solid var(--line);background:var(--surface);color:var(--text)}
  .btn:hover{border-color:var(--accent)}
  .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn.primary:hover{filter:brightness(1.08)}
  .btn.ghost{color:var(--muted)}
  .btn[data-state="done"]{border-color:var(--green);color:var(--green);background:var(--green-soft)}
  .btn[data-state="skipped"]{border-color:var(--red);color:var(--red);background:var(--red-soft)}

  .empty{text-align:center;padding:60px 20px;color:var(--muted)}
  .empty h3{color:var(--text);font-size:17px;margin-bottom:6px}
  .empty p{font-size:13.5px;margin-bottom:18px}

  /* program */
  .wk{margin-bottom:12px;border:1px solid var(--line);border-radius:var(--r);overflow:hidden;background:var(--surface)}
  .wk.cur{border-color:color-mix(in srgb,var(--accent) 50%,var(--line))}
  .wk-head{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface-2);border-bottom:1px solid var(--line)}
  .wk-no{font-family:var(--mono);font-weight:700;font-size:13px;letter-spacing:.04em}
  .wk-pct{font-family:var(--mono);font-size:12px;color:var(--accent)}
  .wk-scheme{font-family:var(--mono);font-size:12px;color:var(--muted);margin-left:auto}
  .cur-badge{font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--accent);border:1px solid color-mix(in srgb,var(--accent) 45%,transparent);padding:2px 6px;border-radius:4px}
  .sess{display:flex;align-items:center;gap:13px;padding:12px 16px;border-bottom:1px solid var(--line-soft);cursor:pointer}
  .sess:last-child{border-bottom:none}
  .sess:hover{background:var(--surface-2)}
  .sess-date{font-family:var(--mono);font-size:12px;color:var(--muted);width:96px;flex-shrink:0}
  .sess-loads{font-family:var(--mono);font-size:12.5px;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--faint);flex-shrink:0}
  .dot.done{background:var(--green)} .dot.skipped{background:var(--red)} .dot.today{background:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

  /* calendar */
  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cal-title{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:.04em}
  .cal-grid{display:grid;grid-template-columns:46px repeat(7,1fr);gap:4px;margin-bottom:4px}
  .cal-dow span{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);text-align:center;padding:2px 0}
  .cal-gut{font-family:var(--mono);font-size:10px;color:var(--faint);align-self:center;text-align:right;padding-right:4px;white-space:nowrap}
  .cal-cell{background:var(--surface);border:1px solid var(--line-soft);border-radius:8px;min-height:64px;padding:5px 6px;overflow:hidden}
  .cal-cell.has{cursor:pointer}
  .cal-cell.has:hover{border-color:var(--line);background:var(--surface-2)}
  .cal-cell.out{opacity:.35}
  .cal-cell.today{border-color:var(--accent)}
  .cal-cell.sel{border-color:var(--accent);background:var(--accent-soft)}
  .cal-num{font-family:var(--mono);font-size:10.5px;color:var(--muted);display:block;margin-bottom:3px}
  .cal-cell.today .cal-num{color:var(--accent);font-weight:700}
  .cal-chip{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:10px;border-radius:4px;padding:1px 4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .cal-chip.lift{background:var(--accent-soft);color:var(--accent)}
  .cal-chip.run{background:rgba(95,211,194,.12);color:var(--teal)}
  .cal-chip.gold{background:rgba(214,164,65,.12);color:var(--amber)}
  .cal-chip .dot{width:5px;height:5px;flex-shrink:0}

  /* plan vs actual */
  .pva{display:grid;grid-template-columns:1fr 1fr;align-items:stretch}
  .actual{border-left:1px solid var(--line);padding:14px 18px;min-width:0}
  .actual .eyebrow{display:block;margin-bottom:8px}
  .actual-name{font-size:13.5px;font-weight:600;margin-bottom:2px}
  .actual-meta{font-family:var(--mono);font-size:11.5px;color:var(--muted);margin-bottom:8px}
  .actual-desc{font-family:var(--mono);font-size:12px;color:var(--muted);white-space:pre-wrap;line-height:1.6;margin:0}
  @media (max-width:760px){.pva{grid-template-columns:1fr}.actual{border-left:none;border-top:1px solid var(--line)}}

  /* progress */
  .chart-head{display:flex;align-items:center;gap:8px;margin:22px 0 12px;flex-wrap:wrap}
  .chip{font-family:var(--sans);font-size:12px;font-weight:600;padding:6px 11px;border-radius:7px;border:1px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer}
  .chip[aria-pressed="true"]{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .rotpick{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
  .rotpick-label{font-size:11px;letter-spacing:.04em;color:var(--muted)}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;background:var(--surface)}
  .seg-btn{font-family:var(--sans);font-size:12.5px;font-weight:600;padding:8px 16px;border:none;background:none;color:var(--muted);cursor:pointer;border-right:1px solid var(--line)}
  .seg-btn:last-child{border-right:none}
  .seg-btn:hover{color:var(--text)}
  .seg-btn[aria-pressed="true"]{background:var(--accent-soft);color:var(--accent)}
  .rot-day{display:flex;align-items:center;gap:14px;padding:9px 0;border-bottom:1px solid var(--line-soft)}
  .rot-day:last-child{border-bottom:none}
  .rot-day-label{font-size:13px;width:46px;color:var(--text)}
  .legend{margin-left:auto;display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted)}
  .lg{width:16px;border-top:2px solid var(--accent);display:inline-block;height:0}
  .lg-dash{border-top-style:dashed}
  .role-pill{font-family:var(--sans);font-size:11px;font-weight:600;letter-spacing:.03em;padding:6px 10px;border-radius:7px;border:1px solid var(--line);background:var(--inset);color:var(--muted);cursor:pointer;flex-shrink:0;width:66px}
  .role-pill[aria-pressed="true"]{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .block-sep{font-size:11px;letter-spacing:.04em;color:var(--amber);font-weight:600;margin:18px 0 10px;padding-left:2px}
  .chartbox{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 16px 12px}
  svg.chart{display:block;width:100%;height:auto}
  .note{font-size:12px;color:var(--muted);margin-top:14px;line-height:1.6}

  /* setup */
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:24px}
  .tab{background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;color:var(--muted);font-family:var(--sans);font-size:13px;font-weight:600;padding:9px 14px;cursor:pointer}
  .tab:hover{color:var(--text)}
  .tab[aria-selected="true"]{color:var(--accent);border-bottom-color:var(--accent)}
  .end-row{display:grid;grid-template-columns:34px 1fr 1fr 1fr;gap:6px;align-items:center;margin-bottom:6px}
  .end-row.end-head span{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
  .end-row>span{font-size:12px;color:var(--muted)}
  input.end-cell{width:100%;text-align:center;padding:7px 6px;font-size:13px}
  input.end-cell.ov{border-color:var(--accent)}
  input.end-cell:disabled{opacity:.55;border-style:dashed}
  .group{margin-bottom:30px}
  .group > .eyebrow{margin-bottom:12px;display:block}
  .field{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .field:last-child{border-bottom:none}
  .field label{font-size:14px}
  .field .hint{font-size:11px;color:var(--faint);display:block;margin-top:2px}
  input[type="text"],input[type="number"],input[type="date"],input[type="time"]{
    font-family:var(--mono);font-size:14px;background:var(--inset);border:1px solid var(--line);
    color:var(--text);border-radius:8px;padding:9px 11px;width:130px;text-align:right}
  input:focus{outline:none;border-color:var(--accent)}
  select{font-family:var(--mono);font-size:13px;background:var(--inset);border:1px solid var(--line);color:var(--text);border-radius:8px;padding:9px 11px}
  select:focus{outline:none;border-color:var(--accent)}
  .kg.run{color:var(--teal)}
  .lift-cfg{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--line-soft)}
  .lift-cfg:last-child{border-bottom:none}
  .lift-cfg input[type="text"]{flex:1;text-align:left;width:auto;min-width:0}
  .lift-cfg .tm{width:86px}
  .toggle{width:42px;height:24px;border-radius:13px;background:var(--inset);border:1px solid var(--line);position:relative;cursor:pointer;flex-shrink:0;transition:background .15s}
  .toggle::after{content:"";position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--faint);transition:transform .15s,background .15s}
  .toggle[aria-checked="true"]{background:var(--accent-soft);border-color:var(--accent)}
  .toggle[aria-checked="true"]::after{transform:translateX(18px);background:var(--accent)}
  .days{display:flex;gap:7px}
  .day{width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--surface);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer}
  .day[aria-pressed="true"]{border-color:var(--accent);color:var(--accent);background:var(--accent-soft)}
  .setup-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px}

  .toast{position:fixed;bottom:22px;left:calc(50% + 118px);transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);font-size:13px;font-weight:600;padding:10px 16px;border-radius:9px;opacity:0;transition:.2s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (max-width:760px){
    .app{flex-direction:column;overflow:auto}
    .sidebar{width:100%;height:auto;flex-direction:row;align-items:center;border-right:none;border-bottom:1px solid var(--line);overflow-x:auto}
    .drag,.side-foot .v{display:none}.brand{padding:14px}
    nav{display:flex;padding:0 8px}.nav-group{margin:0;display:flex}.nav-label{display:none}
    .view{padding:24px 18px 60px}.stats{grid-template-columns:1fr 1fr}
    .toast{left:50%}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="drag"></div>
    <div class="brand"><span class="name">OPER<b>A</b>TOR</span><span class="tag">kg</span></div>
    <nav id="nav"></nav>
    <div class="side-foot">
      <span class="v">v1 · local</span>
      <button class="ghost-btn" id="themeBtn">◐ Theme</button>
    </div>
  </aside>
  <main><div class="view" id="view"></div></main>
</div>
<div class="toast" id="toast"></div>

<script src="js/program.js"></script>
<script>
"use strict";

const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const ICONS={
  today:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>',
  calendar:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="17" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>',
  progress:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><line x1="4" y1="20" x2="20" y2="20"/><line x1="7" y1="20" x2="7" y2="13"/><line x1="12" y1="20" x2="12" y2="8"/><line x1="17" y1="20" x2="17" y2="15"/></svg>',
  setup:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/><circle cx="9" cy="7" r="2.3" fill="var(--side)"/><circle cx="15" cy="12" r="2.3" fill="var(--side)"/><circle cx="8" cy="17" r="2.3" fill="var(--side)"/></svg>',
};
const { todayDate, ymd, parseYMD, addDays, roundTo } = Program;
const defaults = () => Program.defaults();
const enabledLifts = () => Program.enabledLifts(state);
const coreLifts = () => Program.coreLifts(state);
const rotatingLifts = () => Program.rotatingLifts(state);
const hasAnyTM = () => Program.hasAnyTM(state);
const buildSessions = () => Program.buildSessions(state);
const blockOf = (w) => Program.blockOf(state, w);
const effectiveTM = (l, w) => Program.effectiveTM(state, l, w);
const rotForWeekday = (d) => Program.rotForWeekday(state, d);
const chosenRotating = (s) => Program.chosenRotating(state, s);
const sessionLifts = (s) => Program.sessionLifts(state, s);
const targetFor = (l, p, w) => Program.targetFor(state, l, p, w);
const sessionTargets = (s) => Program.sessionTargets(state, s);
const currentSession = (s) => Program.currentSession(state, s);
const weekSpec = (w) => Program.weekSpec(state, w);
function pad(n){return String(n).padStart(2,"0");}
const fmt=Program.fmtKg;

function load(){
  try{
    const r=localStorage.getItem(Program.STORAGE_KEY);
    if(r)return Object.assign(Program.defaults(),JSON.parse(r));
    const legacy=localStorage.getItem(Program.LEGACY_KEY);
    if(legacy)return Program.migrateV1(JSON.parse(legacy));  // v1 left untouched as backup
    return Program.defaults();
  }catch(e){return Program.defaults();}
}
function save(){try{localStorage.setItem(Program.STORAGE_KEY,JSON.stringify(state));}catch(e){} schedulePush();}
let state=load(); let activeTab="today";

/* ---- sync (Electron only; window.api is absent under file://) ----
   NB: the local alias must NOT be named `api` — contextBridge exposes window.api
   as a non-configurable global, and a top-level `const api` collides with it. */
const ipc=window.api||null;
let syncStatus=null;   // last getSyncStatus() result
let stravaQueue=[];    // review-queue items from the last fetch (in-memory; re-derived each sync)
let displacedPrompt=null; // {dateStr} — after a cross-day attach, what to do with that day's displaced plan
let pushT=null;
function googleConnected(){return !!(syncStatus&&syncStatus.google&&syncStatus.google.connected);}
function stravaConnected(){return !!(syncStatus&&syncStatus.strava&&syncStatus.strava.connected);}
function schedulePush(){
  if(!ipc||!googleConnected())return;
  clearTimeout(pushT);
  pushT=setTimeout(()=>{ipc.pushPlan(Program.calendarSnapshot(state)).then(st=>{syncStatus=st;}).catch(()=>{});},1200);
}
function planLite(){
  return {
    sessions:buildSessions().map(s=>({dateStr:s.dateStr,kind:s.kind,sport:Program.sportFor(state,s),
      status:state.status[s.dateStr]||null,activityId:(state.activities[s.dateStr]||{}).id||null})),
    dismissed:state.dismissedActivities,
    today:ymd(todayDate()),
    windowStart:ymd(addDays(todayDate(),-14)),
  };
}
async function runStravaSync(quiet){
  if(!ipc||!stravaConnected())return;
  try{
    const res=await ipc.syncStrava(planLite());
    res.matches.forEach(m=>{state.status[m.dateStr]="done";state.activities[m.dateStr]=m.activity;});
    stravaQueue=res.queue;
    save();render();
    if(!quiet)toast(res.matches.length?res.matches.length+" matched from Strava":"Up to date");
  }catch(e){
    if(!quiet)toast("Strava sync failed");
    if(ipc)syncStatus=await ipc.getSyncStatus().catch(()=>syncStatus);
    render();
  }
}
if(ipc){
  ipc.getSyncStatus().then(st=>{
    syncStatus=st;render();
    if(stravaConnected())runStravaSync(true);
    if(googleConnected())schedulePush();
  }).catch(()=>{});
}
let calYM=null;   // "YYYY-MM" being viewed; null = month of today
let calSel=null;  // selected dateStr in the calendar
function calMonth(){if(calYM){const p=calYM.split("-").map(Number);return{y:p[0],m:p[1]-1};}const t=todayDate();return{y:t.getFullYear(),m:t.getMonth()};}
function shiftCalMonth(n){const c=calMonth();const d=new Date(c.y,c.m+n,1);calYM=d.getFullYear()+"-"+pad(d.getMonth()+1);calSel=null;render();}

/* ---- render ---- */
function el(h){const t=document.createElement("template");t.innerHTML=h.trim();return t.content.firstChild;}
function escapeHtml(s){return String(s).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
function escapeAttr(s){return String(s).replace(/"/g,"&quot;").replace(/</g,"&lt;");}
function shortName(n){return n.replace("Front Squat","F.Squat").replace("Sumo Deadlift","Sumo DL").replace("Weighted Pull-up","Pull-up").replace("DB Bench Press","DB Bench");}
function shortDate(ds){const d=parseYMD(ds);return DOW[d.getDay()]+" "+d.getDate()+" "+d.toLocaleString("en",{month:"short"});}
function sessionLabel(s){return s.kind==="lift"?"🏋 strength":(Program.sportFor(state,s)==="bike"?"🚴 bike":"🏃 run");}
function toggleStatus(d,val){state.status[d]=state.status[d]===val?undefined:val;}
function toggleSwap(d){if(state.sessionSwap[d]==="bike")delete state.sessionSwap[d];else state.sessionSwap[d]="bike";}
/* first date after `fromDateStr` with no planned session — the move-forward target */
function nextOpenDay(fromDateStr){
  const taken=new Set(buildSessions().map(s=>s.dateStr));
  let d=addDays(parseYMD(fromDateStr),1);
  for(let i=0;i<28;i++){const ds=ymd(d);if(!taken.has(ds))return ds;d=addDays(d,1);}
  return null;
}

/* counts only status entries whose date still has a session — template switches can orphan keys */
function statusCount(sessions,val){const live=new Set(sessions.map(s=>s.dateStr));return Object.entries(state.status).filter(([d,v])=>v===val&&live.has(d)).length;}

function greeting(){const h=new Date().getHours();const p=h<12?"morning":h<18?"afternoon":"evening";return "Good "+p+(state.displayName?", "+state.displayName:"");}

function liftRowsHtml(session){
  const pct=Math.round(session.pct*100);
  return sessionTargets(session).map(t=>{
    let val,extra="";
    if(t.target==null){if(t.bw){val=`<div class="kg" style="color:var(--text)">BW</div>`;extra=`<div class="added">bodyweight · ${session.sets}×${session.reps}</div>`;}else val=`<span class="row-flag">set TM</span>`;}
    else if(t.ref.type==="pullup"){val=`<div class="kg">${fmt(t.target)}<small>kg</small></div>`;extra=t.added!=null?`<div class="added">+${fmt(t.added)} added · bw ${fmt(state.bodyweight)}</div>`:`<div class="added">total system load</div>`;}
    else if(t.ref.type==="db"){val=`<div class="kg">${fmt(t.target)}<small>kg/hand</small></div>`;extra=`<div class="added">guide — round to your DBs</div>`;}
    else val=`<div class="kg">${fmt(t.target)}<small>kg</small></div>`;
    return `<div class="lift-row"><div class="lift-meta"><div class="lift-name">${escapeHtml(t.ref.name)}</div>
      <div class="lift-scheme">${session.sets}×${session.reps} @ ${pct}%</div></div><div class="lift-val">${val}${extra}</div></div>`;
  }).join("");
}

function actualHtml(s){
  const a=state.activities[s.dateStr];
  if(state.status[s.dateStr]!=="done"||!a)return "";
  const secs=a.movingSec||a.durationSec||0;
  let meta=Math.round(secs/60)+"′";
  if(a.distanceKm){
    const p=secs/a.distanceKm;
    meta+=` · ${a.distanceKm} km · ${Math.floor(p/60)}:${pad(Math.round(p%60))}/km`;
  }
  return `<div class="actual"><span class="eyebrow">Actual — Strava</span>
    <div class="actual-name">${escapeHtml(a.name)}</div>
    <div class="actual-meta">${meta}</div>
    ${a.description?`<pre class="actual-desc">${escapeHtml(a.description)}</pre>`:`<p class="note" style="margin:0">No description on the activity.</p>`}</div>`;
}
function withActual(s,planHtml){
  const act=actualHtml(s);
  return act?`<div class="pva"><div>${planHtml}</div>${act}</div>`:planHtml;
}

function queueCardHtml(){
  if(!ipc||!stravaQueue.length)return "";
  let rows="";
  stravaQueue.forEach((q,i)=>{
    if(q.type==="missed"){
      rows+=`<div class="lift-row"><div class="lift-meta"><div class="lift-name">Planned ${q.kind} not recorded</div>
        <div class="lift-scheme">${q.dateStr} — no Strava activity found</div></div>
        <div class="actions"><button class="btn ghost" data-qi="${i}" data-qa="skip">Mark skipped</button>
        <button class="btn ghost" data-qi="${i}" data-qa="drop">Leave planned</button></div></div>`;
      return;
    }
    const why={swap:"ride on a run day",restday:"no session this day",mismatch:"sport doesn't fit the plan",ambiguous:"several options this day"}[q.type];
    (q.activities||[q.activity]).forEach(a=>{
      const meta=`${q.dateStr} · ${escapeHtml(a.rawType)} · ${Math.round((a.movingSec||a.durationSec)/60)}′${a.distanceKm?` · ${a.distanceKm} km`:""}`;
      let btns="";
      if(q.type==="swap")btns+=`<button class="btn" data-qi="${i}" data-qa="swap" data-aid="${a.id}">Swap to bike &amp; match</button>`;
      (q.candidates||[]).forEach(c=>{
        const lbl=c.crossDay?`Link to ${c.kind} · ${shortDate(c.dateStr)}`:`Attach to ${c.kind}`;
        btns+=`<button class="btn" data-qi="${i}" data-qa="attach" data-aid="${a.id}" data-date="${c.dateStr}">${lbl}</button>`;
      });
      btns+=`<button class="btn ghost" data-qi="${i}" data-qa="dismiss" data-aid="${a.id}">Not training</button>`;
      rows+=`<div class="lift-row"><div class="lift-meta"><div class="lift-name">${escapeHtml(a.name)}</div>
        <div class="lift-scheme">${meta} · ${why}</div></div><div class="actions">${btns}</div></div>`;
    });
  });
  return `<div class="card" style="margin-top:18px"><div class="card-head"><h3>Strava review</h3><span class="meta">${stravaQueue.length} to resolve</span></div>${rows}</div>`;
}
/* after linking an activity onto another day, ask what to do with the plan that
   day displaced (e.g. ran today instead of the planned heavy lift) */
function displacedPromptHtml(){
  if(!displacedPrompt)return "";
  const s=buildSessions().find(x=>x.dateStr===displacedPrompt.dateStr);
  if(!s)return "";
  return `<div class="card" style="margin-top:18px;border-color:var(--accent)">
    <div class="card-head"><h3>Linked to another day</h3></div>
    <div class="lift-row"><div class="lift-meta"><div class="lift-name">${shortDate(s.dateStr)}'s ${sessionLabel(s)} is still planned</div>
      <div class="lift-scheme">You trained something else that day — what should happen to it?</div></div>
    <div class="actions">
      <button class="btn ghost" data-dp="leave">Leave planned</button>
      <button class="btn" data-dp="skip">Mark skipped</button>
      <button class="btn" data-dp="move">Move to next open day</button>
    </div></div></div>`;
}
function wireQueue(root){
  root.querySelectorAll("[data-qa]").forEach(b=>b.onclick=()=>{
    const i=+b.dataset.qi;const q=stravaQueue[i];if(!q)return;
    const acts=q.activities||[q.activity];
    const act=b.dataset.aid?acts.find(a=>a&&String(a.id)===b.dataset.aid):null;
    const qa=b.dataset.qa;
    if(qa==="dismiss"&&act)state.dismissedActivities.push(act.id);
    else if(qa==="skip")state.status[q.dateStr]="skipped";
    else if(qa==="swap"&&act){state.sessionSwap[q.dateStr]="bike";state.status[q.dateStr]="done";state.activities[q.dateStr]=act;}
    else if(qa==="attach"&&act){
      const target=b.dataset.date;
      state.status[target]="done";state.activities[target]=act;
      /* linked onto a different day than where the activity happened → that day's
         own planned session is displaced; offer leave / skip / move */
      if(target!==q.dateStr){
        const orig=buildSessions().find(s=>s.dateStr===q.dateStr);
        const ost=state.status[q.dateStr];
        if(orig&&ost!=="done"&&ost!=="skipped")displacedPrompt={dateStr:q.dateStr};
      }
    }
    stravaQueue.splice(i,1);
    save();render();
  });
  root.querySelectorAll("[data-dp]").forEach(b=>b.onclick=()=>{
    if(!displacedPrompt)return;
    const d=displacedPrompt.dateStr;const dp=b.dataset.dp;
    if(dp==="skip")state.status[d]="skipped";
    else if(dp==="move"){
      const s=buildSessions().find(x=>x.dateStr===d);const to=s&&nextOpenDay(d);
      if(to)state.sessionMove[s.kind+":"+d]=to;
    }
    displacedPrompt=null;
    save();render();
  });
}

/* readiness + done/skip/sync blocks shared by the lift and run Today views */
function readinessHtml(r){

}
function sessionActionsHtml(st){

      <button class="btn ghost" id="skipBtn" ${st==="skipped"?'data-state="skipped"':""}>${st==="skipped"?"Skipped":"Skip"}</button>

}
function wireSessionCommon(root,cur){

  root.querySelector("#doneBtn").onclick=()=>{toggleStatus(cur.dateStr,"done");save();render();};

}

function renderToday(root){
  const sessions=buildSessions();const cur=currentSession(sessions);
  if(cur&&cur.kind==="run"){renderTodayRun(root,cur,sessions);return;}
  if(!hasAnyTM()||!cur){
    root.innerHTML=`<div class="greet">${escapeHtml(greeting())}</div>

    <div class="greet">${escapeHtml(greeting())}</div>

      <div class="stat am"><div class="n mono">${pct}%</div><div class="l">Intensity</div></div>
      <div class="stat g"><div class="n mono">${done}</div><div class="l">Sessions done</div></div>

function renderTodayRun(root,cur,sessions){

function chipFor(s){
  if(s.kind==="run"){
    const sport=Program.sportFor(state,s);
    if(s.run.type==="test")return{label:s.run.name,cls:"gold"};
    return{label:(sport==="bike"?"Bike ":"LSS ")+Program.runLabel(s.run),cls:s.run.type==="fixed"?"gold":"run"};
  }
  if(s.optional)return{label:"Deload 40%",cls:"gold"};
  const tg=sessionTargets(s).filter(t=>t.target!=null||t.bw);
  const label=tg.length?tg.map(t=>shortName(t.ref.name).split(" ")[0]+" "+(t.bw?"BW":fmt(t.target))).join(" · "):Math.round(s.pct*100)+"% · set TMs";
  return{label,cls:"lift"};
}

function renderCalendar(root){
  const sessions=buildSessions();
  const byDate={};sessions.forEach(s=>{(byDate[s.dateStr]=byDate[s.dateStr]||[]).push(s);});
  const c=calMonth();const weeks=Program.monthMatrix(c.y,c.m);
  const tStr=ymd(todayDate());
  const monthName=new Date(c.y,c.m,1).toLocaleString("en",{month:"long",year:"numeric"});
  const t=Program.template(state);
  let grid=`<div class="cal-head"><button class="btn ghost" id="calPrev">‹ Prev</button><span class="cal-title">${monthName}</span><span style="display:flex;gap:8px">${stravaConnected()?`<button class="btn ghost" id="calSync">↻</button>`:""}<button class="btn ghost" id="calNext">Next ›</button></span></div>
    <div class="cal-grid cal-dow"><span></span>${["Mon","Tue","Wed","Thu","Fri","Sat","Sun"].map(d=>`<span>${d}</span>`).join("")}</div>`;
  weeks.forEach(row=>{
    const rowSess=row.map(d=>byDate[ymd(d)]||[]).flat();
    const wk=rowSess.length?rowSess[0].week:null;
    const sp=wk?weekSpec(wk):null;
    const gut=wk?`W${wk}${sp?` · ${Math.round(sp.pct*100)}%`:""}`:"";
    grid+=`<div class="cal-grid"><span class="cal-gut">${gut}</span>${row.map(d=>{
      const ds=ymd(d);const ss=byDate[ds]||[];
      const chips=ss.map(s=>{const ch=chipFor(s);const stt=state.status[s.dateStr];return `<span class="cal-chip ${ch.cls}">${stt?`<span class="dot ${stt}"></span>`:""}${escapeHtml(ch.label)}</span>`;}).join("");
      const cls=["cal-cell",d.getMonth()!==c.m?"out":"",ds===tStr?"today":"",ds===calSel?"sel":"",ss.length?"has":""].filter(Boolean).join(" ");
      return `<div class="${cls}" data-date="${ds}"><span class="cal-num">${d.getDate()}</span>${chips}</div>`;
    }).join("")}</div>`;
  });
  const detail=(calSel&&byDate[calSel])?calDetailHtml(byDate[calSel]):`<p class="note">Click a session day for details.</p>`;
  root.innerHTML=`<div class="view-title">Calendar</div><div class="sub">${state.weeks} weeks · ${t.label}${t.endurance?` · runs ${state.runDays.slice().sort((a,b)=>a-b).map(d=>DOW[d]).join("/")}`:""}</div>${grid}<div id="calDetail" style="margin-top:18px">${detail}</div>`;
  root.querySelector("#calPrev").onclick=()=>shiftCalMonth(-1);
  root.querySelector("#calNext").onclick=()=>shiftCalMonth(1);
  const cs=root.querySelector("#calSync");if(cs)cs.onclick=()=>runStravaSync();
  root.querySelectorAll(".cal-cell.has").forEach(cell=>cell.onclick=()=>{calSel=calSel===cell.dataset.date?null:cell.dataset.date;render();});
  wireCalDetail(root);
}

function calDetailHtml(ss){
  return ss.map(s=>{
    const dateLabel=shortDate(s.dateStr);
    const st=state.status[s.dateStr]||null;
    const statusBtns=`<div class="actions" style="padding:14px 18px">
      <button class="btn" data-act="done" data-date="${s.dateStr}" ${st==="done"?'data-state="done"':""}>${st==="done"?"✓ Done":"Mark done"}</button>
      <button class="btn ghost" data-act="skip" data-date="${s.dateStr}" ${st==="skipped"?'data-state="skipped"':""}>${st==="skipped"?"Skipped":"Skip"}</button>
      ${s.kind==="run"?`<button class="btn" data-act="swap" data-date="${s.dateStr}">${Program.sportFor(state,s)==="bike"?"Back to run":"Swap to bike"}</button>`:""}
    </div>`;
    if(s.kind==="run"){
      const sport=Program.sportFor(state,s);
      const title=s.run.type==="test"?s.run.name:(sport==="bike"?"LSS Bike":"LSS Run");
      return `<div class="card"><div class="card-head"><h3>Week ${s.week} — ${escapeHtml(title)}</h3><span class="meta">${dateLabel}</span></div>
        ${withActual(s,`<div class="lift-row"><div class="lift-meta"><div class="lift-name">${escapeHtml(title)}</div><div class="lift-scheme">low aerobic · flat terrain</div></div>
        <div class="lift-val"><div class="kg run">${escapeHtml(Program.runLabel(s.run))}</div></div></div>`)}${statusBtns}</div>`;
    }
    const rot=rotatingLifts();const ch=chosenRotating(s);
    const rotPick=rot.length>1?`<div class="rotpick" style="padding:0 18px 4px"><span class="rotpick-label">Rotating slot</span><div class="seg">${rot.map(l=>`<button class="seg-btn" data-act="rot" data-date="${s.dateStr}" data-rot="${l.id}" aria-pressed="${ch&&ch.id===l.id}">${escapeHtml(shortName(l.name))}</button>`).join("")}</div></div>`:"";
    return `<div class="card"><div class="card-head"><h3>Week ${s.week} — ${Math.round(s.pct*100)}%${s.optional?' · <span style="color:var(--amber)">Deload</span>':""}</h3><span class="meta">${dateLabel} · ${s.sets}×${s.reps}</span></div>
      ${withActual(s,liftRowsHtml(s))}${rotPick}${statusBtns}</div>`;
  }).join("");
}

    :`Weeks 1–6 are one block (70·80·90 / 75 deload / 85·95). Beyond week 6 the chart <b>projects</b> the next blocks assuming each lift's TM steps up — +5 kg on lower-body lifts, +2.5 kg on upper — set per lift in Setup.`;

function svgChart(pts,blkWeeks){
  const W=720,H=230,padL=44,padR=16,padT=16,padB=28;
  const xs=pts.map(p=>p.w),ys=pts.map(p=>p.v);
  const minY=Math.min.apply(null,ys),maxY=Math.max.apply(null,ys);
  const lo=Math.floor(minY*0.96/5)*5,hi=Math.ceil(maxY*1.02/5)*5;
  const X=w=>padL+(w-xs[0])/Math.max(1,xs[xs.length-1]-xs[0])*(W-padL-padR);
  const Y=v=>padT+(1-(v-lo)/Math.max(1,hi-lo))*(H-padT-padB);
  let grid="",ticks="";
  for(let i=0;i<=3;i++){const v=lo+(hi-lo)*i/3,y=Y(v);grid+=`<line x1="${padL}" y1="${y.toFixed(1)}" x2="${W-padR}" y2="${y.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;ticks+=`<text x="${padL-9}" y="${(y+4).toFixed(1)}" text-anchor="end" fill="var(--faint)" font-size="11" font-family="var(--mono)">${Math.round(v)}</text>`;}
  const BLK=blkWeeks||6;
  const mk=arr=>arr.map((p,i)=>(i?"L":"M")+X(p.w).toFixed(1)+" "+Y(p.v).toFixed(1)).join(" ");
  const solidPts=pts.filter(p=>p.w<=BLK),dashPts=pts.filter(p=>p.w>=BLK);
  const solidPath=solidPts.length>1?`<path d="${mk(solidPts)}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round"/>`:"";
  const dashPath=dashPts.length>1?`<path d="${mk(dashPts)}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-dasharray="5 4" opacity="0.8"/>`:"";
  const dots=pts.map(p=>{const proj=p.w>BLK;return `<circle cx="${X(p.w).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="3" fill="${proj?"var(--surface)":"var(--accent)"}" stroke="var(--accent)" stroke-width="${proj?1.5:0}"/>`;}).join("");
  let xl="";pts.forEach(p=>{if(p.w%2===1||p.w===pts.length)xl+=`<text x="${X(p.w).toFixed(1)}" y="${H-9}" text-anchor="middle" fill="var(--faint)" font-size="10" font-family="var(--mono)">${p.w}</text>`;});
  const hpts=pts.map(p=>`<circle class="hpt" cx="${X(p.w).toFixed(1)}" cy="${Y(p.v).toFixed(1)}" r="18" fill="transparent" data-w="${p.w}" data-v="${fmt(p.v)}" data-x="${X(p.w).toFixed(1)}" data-y="${Y(p.v).toFixed(1)}"/>`).join("");
  const tip=`<g id="chartTip" style="display:none" pointer-events="none"><rect width="96" height="44" rx="7" fill="var(--surface-2)" stroke="var(--line)"/><text id="tipW" x="12" y="19" fill="var(--muted)" font-size="11" font-family="var(--mono)">Wk</text><text id="tipV" x="12" y="35" fill="var(--text)" font-size="14" font-weight="600" font-family="var(--mono)">—</text></g>`;
  return `<svg class="chart" viewBox="0 0 ${W} ${H}" role="img" aria-label="Load by week">${grid}${solidPath}${dashPath}${dots}${ticks}${xl}${hpts}${tip}</svg>`;
}
function wireChart(root){
  const svg=root.querySelector("svg.chart");if(!svg)return;
  const tip=svg.querySelector("#chartTip");if(!tip)return;
  const tw=svg.querySelector("#tipW"),tv=svg.querySelector("#tipV");
  const show=c=>{const x=+c.getAttribute("data-x"),y=+c.getAttribute("data-y");
    tw.textContent="Wk "+c.getAttribute("data-w");tv.textContent=c.getAttribute("data-v")+" kg";
    let tx=Math.max(2,Math.min(x-48,720-98)),ty=y-54;if(ty<2)ty=y+16;
    tip.setAttribute("transform","translate("+tx+","+ty+")");tip.style.display="";};
  svg.querySelectorAll(".hpt").forEach(c=>{
    c.style.cursor="pointer";
    c.addEventListener("mouseenter",()=>show(c));
    c.addEventListener("mousemove",()=>show(c));
    c.addEventListener("mouseleave",()=>{tip.style.display="none";});
    c.addEventListener("touchstart",()=>show(c),{passive:true});
  });
}

let setupTab="program";
function renderSetup(root){
  const hasEnd=!!Program.template(state).endurance;
  if(setupTab==="endurance"&&!hasEnd)setupTab="program";
  const tabs=[["program","Program"],["lifts","Lifts"],...(hasEnd?[["endurance","Endurance"]]:[]),["connections","Connections"],["general","General"]];
  const tabRow=`<div class="tabs">${tabs.map(([k,l])=>`<button class="tab" data-stab="${k}" aria-selected="${setupTab===k}">${l}</button>`).join("")}</div>`;
  const dayBtns=[1,2,3,4,5,6,0].map(d=>`<button class="day" data-day="${d}" aria-pressed="${state.liftDays.includes(d)}">${DOW[d][0]}</button>`).join("");
  const liftRows=state.lifts.map(l=>`<div class="lift-cfg" data-id="${l.id}"><div class="toggle" role="switch" aria-checked="${l.enabled}" data-toggle></div><input type="text" value="${escapeAttr(l.name)}" data-name><button class="role-pill" data-role aria-pressed="${l.role==="rotating"}">${l.role==="rotating"?"Rotate":"Every"}</button><input type="number" class="tm" value="${l.tm==null?"":l.tm}" placeholder="TM" step="0.5" data-tm></div>`).join("");
  const stepRows=enabledLifts().map(l=>`<div class="field"><label>${escapeHtml(shortName(l.name))}</label><input type="number" value="${l.blockStep==null?"":l.blockStep}" step="0.5" data-step data-id="${l.id}"></div>`).join("");
  const rotL=rotatingLifts();
  const rotSchedHtml = rotL.length>1 ? `<div class="group"><span class="eyebrow">Rotation — which lift on each day</span>${state.liftDays.slice().sort((a,b)=>a-b).map(dow=>{const cur=rotForWeekday(dow);return `<div class="rot-day"><span class="rot-day-label">${DOW[dow]}</span><div class="seg">${rotL.map(l=>`<button class="seg-btn" data-rotday="${dow}" data-rotlift="${l.id}" aria-pressed="${cur&&cur.id===l.id}">${escapeHtml(shortName(l.name))}</button>`).join("")}</div></div>`;}).join("")}<p class="note">Set it once and it repeats identically every week — e.g. Mon Pull-up, Wed Deadlift, Fri Pull-up = 1× Deadlift, 2× Pull-up. Override a single day on the Today screen.</p></div>` : "";
  let body="";
  if(setupTab==="program"){
    body=`<div class="group"><span class="eyebrow">Program</span>
      <div class="field"><label>Template <span class="hint">lifting wave &amp; endurance</span></label>
        <select data-template>${Object.values(Program.TEMPLATES).map(t=>`<option value="${t.id}" ${state.template===t.id?"selected":""}>${t.label}</option>`).join("")}</select></div>
      <div class="field"><label>Week 1 start <span class="hint">pick the Monday</span></label><input type="date" value="${state.startDate}" data-k="startDate"></div>
      <div class="field"><label>Length <span class="hint">weeks</span></label><input type="number" value="${state.weeks}" min="3" max="52" data-k="weeks"></div>
      <div class="field"><label>Plate increment <span class="hint">kg rounding</span></label><input type="number" value="${state.increment}" step="0.5" data-k="increment"></div>
    </div>`;
  }else if(setupTab==="lifts"){
    body=`<div class="group"><span class="eyebrow">Lift days</span><div class="days" id="days">${dayBtns}</div></div>
    <div class="group"><span class="eyebrow">Cluster — toggle, rename, Every/Rotate, training max (kg)</span>${liftRows}<p class="note">“Every” lifts run every session. “Rotate” lifts share one slot — set the weekly pattern below.</p></div>
    ${rotSchedHtml}
    <div class="group"><span class="eyebrow">Block step — kg added to each TM per block (every ${Program.template(state).tmStepEvery} weeks)</span>${stepRows}</div>`;
  }else if(setupTab==="endurance"){
    body=`<div class="group"><span class="eyebrow">Run days (LSS)</span><div class="days" id="runDays">${[1,2,3,4,5,6,0].map(d=>`<button class="day" data-day="${d}" aria-pressed="${state.runDays.includes(d)}">${DOW[d][0]}</button>`).join("")}</div><p class="note">Three slots per week, matched in order to the book's table (slot 3 is the long one).</p></div>
    ${enduranceEditorHtml()}`;
  }else if(setupTab==="connections"){
    body=connectionsHtml();
  }else{
    body=`<div class="group"><span class="eyebrow">General</span>
      <div class="field"><label>Your name <span class="hint">shown in the greeting</span></label><input type="text" value="${escapeAttr(state.displayName||"")}" data-k="displayName"></div>
      <div class="field"><label>Bodyweight <span class="hint">for pull-up added load</span></label><input type="number" value="${state.bodyweight==null?"":state.bodyweight}" step="0.5" placeholder="—" data-k="bodyweight"></div>
    </div>
    <div class="group"><span class="eyebrow">Data</span>
      <div class="setup-actions">
        <button class="btn" id="backupBtn">Back up data</button>
        <button class="btn" id="restoreBtn">Restore</button>
        <button class="btn ghost" id="resetBtn">Reset all</button>
        <input type="file" id="restoreFile" accept="application/json" hidden>
      </div>
    </div>`;
  }
  root.innerHTML=`<div class="view-title">Setup</div><div class="sub">Enter your numbers once — every week is computed from them.</div>${tabRow}${body}`;
  root.querySelectorAll("[data-stab]").forEach(b=>b.onclick=()=>{setupTab=b.dataset.stab;renderSetup(root);});
  root.querySelectorAll("[data-k]").forEach(inp=>inp.addEventListener("change",()=>{
    const k=inp.dataset.k;let v=inp.value;
    if(k==="weeks")v=parseInt(v,10)||state[k];
    else if(k==="increment")v=parseFloat(v)||state[k];
    else if(k==="bodyweight")v=v===""?null:parseFloat(v);
    state[k]=v;save();render();
  }));
  const tplSel=root.querySelector("[data-template]");
  if(tplSel)tplSel.addEventListener("change",()=>{
    const id=tplSel.value;const tpl=Program.TEMPLATES[id];
    if(!confirm(`Switch to ${tpl.label}? Done/skipped history is kept; the wave and schedule change.`)){renderSetup(root);return;}
    state.template=id;state.weeks=tpl.weeks;save();render();toast(tpl.label);
  });
  const ld=root.querySelector("#days");
  if(ld)ld.addEventListener("click",e=>{const b=e.target.closest(".day");if(!b)return;const d=Number(b.dataset.day);if(state.runDays&&state.runDays.includes(d)){toast("Already a run day");return;}const i=state.liftDays.indexOf(d);if(i>=0){if(state.liftDays.length>1)state.liftDays.splice(i,1);}else state.liftDays.push(d);save();renderSetup(root);});
  const rd=root.querySelector("#runDays");
  if(rd)rd.addEventListener("click",e=>{const b=e.target.closest(".day");if(!b)return;const d=Number(b.dataset.day);if(state.liftDays.includes(d)){toast("Already a lift day");return;}const i=state.runDays.indexOf(d);if(i>=0){if(state.runDays.length>1)state.runDays.splice(i,1);}else state.runDays.push(d);save();renderSetup(root);});
  root.querySelectorAll(".lift-cfg").forEach(row=>{const id=row.dataset.id;const lift=state.lifts.find(l=>l.id===id);
    row.querySelector("[data-toggle]").onclick=()=>{lift.enabled=!lift.enabled;save();renderSetup(root);};
    row.querySelector("[data-role]").onclick=()=>{lift.role=(lift.role==="rotating")?"core":"rotating";save();renderSetup(root);};
    row.querySelector("[data-name]").addEventListener("change",e=>{lift.name=e.target.value||lift.name;save();});
    row.querySelector("[data-tm]").addEventListener("change",e=>{lift.tm=e.target.value===""?null:parseFloat(e.target.value);save();});});
  root.querySelectorAll("[data-step]").forEach(inp=>inp.addEventListener("change",()=>{const lift=state.lifts.find(l=>l.id===inp.dataset.id);if(lift){lift.blockStep=inp.value===""?0:parseFloat(inp.value);save();}}));
  root.querySelectorAll("[data-rotday]").forEach(b=>b.onclick=()=>{state.rotSchedule[Number(b.dataset.rotday)]=b.dataset.rotlift;save();renderSetup(root);});
  const bkB=root.querySelector("#backupBtn");
  if(bkB)bkB.onclick=()=>download("operator-backup.json",JSON.stringify(state,null,2),"application/json");
  const rsB=root.querySelector("#restoreBtn");
  if(rsB)rsB.onclick=()=>root.querySelector("#restoreFile").click();
  const rsF=root.querySelector("#restoreFile");
  if(rsF)rsF.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{state=Object.assign(defaults(),JSON.parse(r.result));save();render();toast("Restored");}catch(err){toast("Bad file");}};r.readAsText(f);};
  const rstB=root.querySelector("#resetBtn");
  if(rstB)rstB.onclick=()=>{if(confirm("Erase all settings and progress?")){state=defaults();save();render();toast("Reset");}};
  root.querySelectorAll(".end-cell").forEach(inp=>inp.addEventListener("change",()=>{
    const w=+inp.dataset.w,slot=+inp.dataset.slot;
    if(inp.value.trim()===""){
      const ov=state.enduranceOverrides[w];
      if(ov){delete ov[slot];if(!Object.keys(ov).length)delete state.enduranceOverrides[w];}
      save();renderSetup(root);return;
    }
    const spec=Program.parseRunSpec(inp.value);
    if(!spec){toast("Use 30, 30-60 or 120+");renderSetup(root);return;}
    (state.enduranceOverrides[w]=state.enduranceOverrides[w]||{})[slot]=spec;
    save();renderSetup(root);
  }));
  const rb=root.querySelector("#resetBook");
  if(rb)rb.onclick=()=>{if(confirm("Discard all endurance edits and restore the book table?")){state.enduranceOverrides={};save();renderSetup(root);toast("Book values restored");}};
  root.querySelectorAll("[data-conn]").forEach(b=>b.onclick=async()=>{
    const key=b.dataset.conn;
    const idEl=root.querySelector(`[data-cred="${key}"][data-cf="clientId"]`);
    const secEl=root.querySelector(`[data-cred="${key}"][data-cf="clientSecret"]`);
    const id=idEl.value.trim(),sec=secEl.value.trim();
    try{
      if(id||sec)syncStatus=await ipc.setCredentials(key,{clientId:id,clientSecret:sec});
      b.textContent="Waiting for the browser…";b.disabled=true;
      syncStatus=key==="google"?await ipc.connectGoogle():await ipc.connectStrava();
      toast("Connected");
      if(key==="google")schedulePush();else runStravaSync(true);
    }catch(e){toast("Connect failed");if(ipc)syncStatus=await ipc.getSyncStatus().catch(()=>syncStatus);}
    renderSetup(root);
  });
  root.querySelectorAll("[data-disc]").forEach(b=>b.onclick=async()=>{
    if(!confirm("Disconnect? Tokens are forgotten. The Operator calendar stays in Google — delete it there if you want it gone."))return;
    syncStatus=await ipc.disconnect(b.dataset.disc);renderSetup(root);
  });
  const pn=root.querySelector("#pushNow");
  if(pn)pn.onclick=async()=>{pn.disabled=true;pn.textContent="Pushing…";
    syncStatus=await ipc.pushPlan(Program.calendarSnapshot(state));
    toast(syncStatus.google.lastError?"Push failed":"Plan pushed");renderSetup(root);};
  const fn=root.querySelector("#fetchNow");
  if(fn)fn.onclick=async()=>{fn.disabled=true;fn.textContent="Fetching…";await runStravaSync();renderSetup(root);};
}

function connectionsHtml(){
  if(!ipc)return `<div class="empty"><h3>Desktop only</h3><p>Google Calendar and Strava sync run in the desktop app.<br>Everything else works right here in the browser.</p></div>`;
  if(!syncStatus)return `<div class="empty"><p>Loading sync status…</p></div>`;
  const ts=v=>v?new Date(v).toLocaleString():"—";
  const provider=(key,p,title,hint)=>{
    const dot=`<span class="dot ${p.connected?"done":""}" style="display:inline-block;vertical-align:middle;margin-right:7px"></span>`;
    if(p.connected){
      const when=key==="google"?p.lastSync:p.lastFetch;
      return `<div class="group"><span class="eyebrow">${dot}${title} — connected</span>
        <div class="field"><label>${key==="google"?"Mirror":"Activities"}<span class="hint">${key==="google"?"all-day plan events in the “Operator” calendar":"last ~14 days, matched to the plan"}</span></label>
          <button class="btn ghost" data-disc="${key}">Disconnect</button></div>
        <div class="field"><label>${key==="google"?"Last push":"Last fetch"}${p.lastError?`<span class="hint" style="color:var(--red)">${escapeHtml(p.lastError)}</span>`:""}</label>
          <span class="mono" style="font-size:12px;color:var(--muted)">${ts(when)}</span></div>
        <div class="setup-actions">${key==="google"
          ?`<button class="btn" id="pushNow">Push plan now</button>`
          :`<button class="btn" id="fetchNow">↻ Fetch activities</button>`}</div></div>`;
    }
    return `<div class="group"><span class="eyebrow">${dot}${title}</span>
      <div class="field"><label>Client ID <span class="hint">${hint}</span></label>
        <input type="text" style="width:300px;text-align:left" data-cred="${key}" data-cf="clientId" placeholder="${p.hasCredentials?"saved — leave blank to reuse":""}"></div>
      <div class="field"><label>Client secret</label>
        <input type="text" style="width:300px;text-align:left" data-cred="${key}" data-cf="clientSecret" placeholder="${p.hasCredentials?"saved — leave blank to reuse":""}"></div>
      <div class="setup-actions"><button class="btn primary" data-conn="${key}">Connect ${title}</button></div>
      ${p.lastError?`<p class="note" style="color:var(--red)">${escapeHtml(p.lastError)}</p>`:""}</div>`;
  };
  return provider("google",syncStatus.google,"Google Calendar","OAuth Desktop client — see README")
       +provider("strava",syncStatus.strava,"Strava","API application — see README");
}

  for(let w=1;w<=t.weeks;w++){
    rows+=`<div class="end-row"><span class="mono">${pad(w)}</span>${[0,1,2].map(slot=>{
      const spec=Program.runSpecAt(state,w,slot);
      const isTest=spec&&spec.type==="test";
      const isOv=!!((state.enduranceOverrides[w]||{})[slot]);
      return `<input type="text" class="end-cell${isOv?" ov":""}" data-w="${w}" data-slot="${slot}" value="${escapeAttr(Program.runEditLabel(spec))}" ${isTest?"disabled":""}>`;
    }).join("")}</div>`;
  }
  return `<div class="group"><span class="eyebrow">Week-by-week minutes — book values unless edited</span>${rows}
    <p class="note">Formats: <b>30</b> fixed · <b>30-60</b> range · <b>120+</b> open-ended. Accent border = edited; clear a cell to restore the book value. The 6-Mile Test isn't editable.</p>
    <div class="setup-actions"><button class="btn" id="resetBook">Reset all to book</button></div></div>`;
}

/* ---- utils ---- */
function download(name,text,mime){const b=new Blob([text],{type:mime});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(u),800);}
let toastT;function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1800);}

document.getElementById("nav").addEventListener("click",e=>{const t=e.target.closest(".nav-item");if(!t)return;activeTab=t.dataset.tab;render();});
document.getElementById("themeBtn").onclick=()=>{state.theme=state.theme==="dark"?"light":"dark";save();render();};
render();
</script>
</body>
